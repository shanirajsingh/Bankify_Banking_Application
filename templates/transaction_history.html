{% extends "base.html" %}
{% block content %}
<h3>Last 5 Transactions</h3>
<div class="card shadow">
  <div class="card-body">
    {% if rows %}
      <table class="table table-striped table-bordered text-center">
        <thead>
          <tr>
            <th>Date</th>
            <th>Details</th>
            <th>Debit (₹)</th>
            <th>Credit (₹)</th>
            <th>Balance (₹)</th>
          </tr>
        </thead>
        <tbody>
          {% for r in rows %}
          <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>{{ r[3] }}</td>
            <td>{{ r[4] }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p>No transactions found.</p>
    {% endif %}
  </div>
</div>

<div class="d-flex justify-content-center mt-3">
    <a href="{{ url_for('main_menu') }}" class="btn btn-secondary">Back to Menu</a>
  </div>
</div>
{% endblock %}
