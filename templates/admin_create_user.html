{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white text-center">
      <h2>➕ Create New User</h2>
    </div>
    <div class="card-body">
      <form method="post" class="mt-3">
        <div class="mb-3">
          <label class="form-label fw-bold">👤 User Name</label>
          <input type="text" name="user_name" class="form-control" placeholder="Enter full name" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">📧 Email</label>
          <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">🔑 PIN (4–6 digits)</label>
          <input type="password" name="pin" pattern="[0-9]{4,6}" class="form-control" placeholder="Enter PIN" 
          autocomplete="off" 
          required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">💰 Opening Balance</label>
          <input type="number" step="0.01" name="balance" value="1000" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">⚙️ Make Admin?</label>
          <select class="form-select" name="is_admin">
            <option value="0" selected>No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="d-flex justify-content-between">
          <button class="btn btn-success px-4">Create User</button>
          <a href="{{ url_for('admin_users') }}" class="btn btn-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
