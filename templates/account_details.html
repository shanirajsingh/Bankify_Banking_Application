{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2 class="text-center mb-4">Account Details</h2>

  {% if details %}
  <div class="card shadow">
    <div class="card-body">
      <table class="table table-borderless">
        <tbody>
          <tr>
            <th>Account Number:</th>
            <td>{{ details.account_number }}</td>
          </tr>
          <tr>
            <th>Account Holder:</th>
            <td>{{ details.name }}</td>
          </tr>
          <tr>
            <th>Email:</th>
            <td>{{ details.email }}</td>
          </tr>
          <tr>
            <th>Balance (₹):</th>
            <td>{{ details.balance }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  {% else %}
  <div class="alert alert-warning text-center">
    No account details found.
  </div>
  {% endif %}

  <div class="mt-3 text-center">
    <a href="{{ url_for('main_menu') }}" class="btn btn-secondary">Back to Menu</a>
  </div>
</div>
{% endblock %}
